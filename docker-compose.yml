services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tournament_db
      POSTGRES_USER: tournament_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://tournament_user:${DB_PASSWORD}@postgres:5432/tournament_db
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      PORT: 3000
    depends_on:
      - postgres
    networks:
      - internal
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${APP_PORT:-8081}:80"
    depends_on:
      - backend
    networks:
      - internal
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  internal:
